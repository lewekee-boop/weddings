<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Приглашение на роспись Алексея и Юлии">
    <title>Алексей & Юлия | Приглашение</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="page">
      <section class="invitation" aria-label="Приглашение на роспись">
        <div class="visual" aria-hidden="true"></div>
        <div class="petals" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="glow" aria-hidden="true"></div>

        <article class="card">
          <p class="overline">приглашение на роспись</p>
          <h1>Алексей <span>&</span> Юлия</h1>
          <p class="lead">
            Мы будем рады разделить с вами день, когда скажем друг другу
            самое важное "да".
          </p>

          <div class="details" aria-label="Детали церемонии">
            <div>
              <span>Дата</span>
              <strong id="event-date">уточняется</strong>
            </div>
            <div>
              <span>Время</span>
              <strong id="event-time">уточняется</strong>
            </div>
            <div class="wide">
              <span>Место</span>
              <strong id="event-place">ЗАГС</strong>
            </div>
          </div>

          <p class="text" id="invite-text">
            Дорогие родные и друзья! Приглашаем вас стать свидетелями нашей
            росписи и провести этот теплый момент рядом с нами.
          </p>

          <div class="actions">
            <a class="button primary" id="map-link" href="#" target="_blank" rel="noreferrer">
              Открыть карту
            </a>
          </div>
        </article>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
